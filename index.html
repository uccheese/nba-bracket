<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nate's NBA Playoff Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --card: #13131e;
  --card2: #17172a;
  --border: rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.14);
  --accent-e: #f04d4d;
  --accent-w: #3d9ef5;
  --gold: #f5b943;
  --gold-glow: rgba(245,185,67,0.22);
  --green: #22c55e;
  --muted: #52527a;
  --dim: #1e1e30;
  --text: #e8e8f4;
  --textd: #7a7a9a;
  --conn-e: rgba(240,77,77,0.4);
  --conn-w: rgba(61,158,245,0.4);
  --r: 9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 50% at 15% 50%,rgba(240,77,77,.05) 0%,transparent 70%),
    radial-gradient(ellipse 55% 50% at 85% 50%,rgba(61,158,245,.05) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 100%,rgba(245,185,67,.06) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* Header */
header{
  position:relative;z-index:10;
  background:rgba(6,6,8,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:18px 24px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.brand h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,4.5vw,54px);letter-spacing:4px;line-height:1;color:#fff;}
.brand h1 em{font-style:normal;color:var(--gold);}
.brand .sub{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:5px;}
.hdr-r{text-align:right;}
.dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:5px;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.rl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.nr{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);margin-top:3px;}
.lu{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}

/* Conf bar */
.conf-bar{position:relative;z-index:10;display:flex;justify-content:space-between;padding:10px 24px 0;}
.clabel{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:5px;}
.clabel.e{color:var(--accent-e);}
.clabel.w{color:var(--accent-w);}

/* Bracket */
#bracket-outer{position:relative;z-index:10;overflow-x:auto;padding:0 0 80px;}
#bracket{display:flex;min-width:880px;padding:14px 14px 0;position:relative;}

/* Layout */
.half{flex:1;display:flex;position:relative;}
.half.east{flex-direction:row;}
.half.west{flex-direction:row-reverse;}

.rcol{display:flex;flex-direction:column;position:relative;}
.rcol.r1{flex:1.15;}
.rcol.r2{flex:1;}
.rcol.r3{flex:.8;}

.rh{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;text-align:center;padding:5px 4px 10px;}
.slots{flex:1;display:flex;flex-direction:column;}
.top-grp{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;}
.bot-grp{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;}
.grp-gap{height:10px;flex-shrink:0;}
.r2-grp{flex:1;display:flex;flex-direction:column;justify-content:center;}
.r3-grp{flex:1;display:flex;flex-direction:column;justify-content:center;}

/* Matchup card */
.mc{margin:4px 5px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.mc:hover{border-color:var(--border-hi);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.mc.done{opacity:.72;}
.mc.done:hover{opacity:.94;}
.mc-lbl{
  font-family:'IBM Plex Mono',monospace;font-size:7.5px;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;
  padding:5px 9px 4px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.badge{font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:1px;padding:1px 5px;border-radius:3px;text-transform:uppercase;}
.badge.live{background:rgba(34,197,94,.15);color:var(--green);}
.badge.fin{background:rgba(255,255,255,.05);color:var(--muted);}

/* Team row */
.tr{display:flex;align-items:center;padding:7px 10px 7px 7px;gap:6px;border-bottom:1px solid var(--border);min-height:44px;transition:background .15s;position:relative;}
.tr:last-child{border-bottom:none;}
.tr.winning{background:rgba(245,185,67,.07);}
.tr.winner{background:rgba(34,197,94,.1);}
.tr.loser{opacity:.38;}

.sd{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--muted);width:12px;flex-shrink:0;text-align:center;}
.lw{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;}
/* fallback circle */
.fb{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:8px;color:#fff;flex-shrink:0;}

/* win/loss badge */
.wbadge{position:absolute;right:-3px;bottom:-3px;width:12px;height:12px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;line-height:1;}
.wbadge.ok{background:var(--green);color:#000;}
.wbadge.ko{background:#2a2a3a;color:var(--muted);}

.tn{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tn.out{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(255,255,255,.1);}
.tn.hi{color:#fff;}
.wb{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;width:20px;text-align:center;flex-shrink:0;}
.wb.lead{color:var(--gold);}
.wb.trail{color:var(--muted);}
.wb.champ{color:var(--green);}

/* Blank line placeholders for future rounds */
.blank-col{flex:1;display:flex;flex-direction:column;padding:5px;}
.blank-rh{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;text-align:center;padding:5px 4px 10px;}
.blank-slots{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:8px;}
.blank-line{height:1px;background:var(--dim);border-radius:1px;margin:0 6px;}

/* Connector SVG */
.connector-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

/* Finals center */
.fcenter{width:190px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 5px;position:relative;z-index:5;}
.trophy{font-size:32px;margin-bottom:7px;filter:drop-shadow(0 0 14px rgba(245,185,67,.5));animation:glow 3s ease-in-out infinite;}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 6px rgba(245,185,67,.3));}50%{filter:drop-shadow(0 0 22px rgba(245,185,67,.8));}}
.ftitle{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:5px;color:var(--gold);margin-bottom:9px;}
.fcard{width:100%;background:var(--card2);border:1px solid rgba(245,185,67,.5);border-radius:10px;overflow:hidden;box-shadow:0 0 40px var(--gold-glow);}
.frow{display:flex;align-items:center;padding:10px 12px;min-height:50px;gap:7px;}
.frow-lbl{font-size:10.5px;color:var(--textd);flex:1;}
.fdiv{height:1px;background:rgba(245,185,67,.15);}

/* Status bar */
.sbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,6,8,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:8px 24px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:7.5px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.lsq{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* Refresh notice */
.rnote{position:fixed;top:14px;right:14px;z-index:9999;background:var(--card);border:1px solid var(--gold);border-radius:6px;padding:8px 14px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);display:none;}
.rnote.on{display:block;}

/* Mobile */
@media(max-width:768px){
  header{padding:12px 16px 10px;}
  .brand h1{font-size:24px;letter-spacing:3px;}
  #bracket{min-width:740px;padding:10px 8px 0;}
  .tn{font-size:10.5px;}
  .wb{font-size:18px;}
  .lw{width:22px;height:22px;}
  .tr{padding:5px 7px 5px 5px;min-height:38px;}
  .fcenter{width:150px;}
  .ftitle{font-size:12px;}
  .trophy{font-size:24px;}
  .sbar{padding:7px 16px;gap:10px;}
}
::-webkit-scrollbar{height:4px;width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Nate's <em>NBA</em> Playoff Tracker</h1>
    <div class="sub">2026 · First Round · Live Bracket</div>
  </div>
  <div class="hdr-r">
    <div class="rl"><span class="dot"></span>Auto-refresh · 9 PM · 11 PM · 1 AM ET</div>
    <div class="nr" id="nr">Next refresh: —</div>
    <div class="lu" id="lu">Last updated: —</div>
  </div>
</header>

<div class="conf-bar">
  <div class="clabel e">⬤ Eastern Conference</div>
  <div class="clabel w">Western Conference ⬤</div>
</div>

<div id="bracket-outer">
  <div id="bracket"></div>
</div>

<div class="sbar">
  <div class="leg"><div class="lsq" style="background:var(--green)"></div>Won Series</div>
  <div class="leg"><div class="lsq" style="background:var(--gold)"></div>Leading</div>
  <div class="leg"><div class="lsq" style="background:var(--muted)"></div>Trailing / Out</div>
  <div style="margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:7.5px;color:var(--muted);letter-spacing:1px;">SPORTRADAR · NBA</div>
</div>

<div class="rnote" id="rn">↻ Refreshing bracket…</div>

<script>
// ── NBA logo IDs ────────────────────────────────────────────────────────────
const NBA_ID = {
  ATL:1610612737,BOS:1610612738,CLE:1610612739,CHI:1610612741,
  DAL:1610612742,DEN:1610612743,GSW:1610612744,HOU:1610612745,
  LAC:1610612746,LAL:1610612747,MIA:1610612748,MIL:1610612749,
  MIN:1610612750,BKN:1610612751,NYK:1610612752,ORL:1610612753,
  IND:1610612754,PHI:1610612755,PHX:1610612756,POR:1610612757,
  SAC:1610612758,SAS:1610612759,OKC:1610612760,TOR:1610612761,
  UTA:1610612762,MEM:1610612763,WAS:1610612764,DET:1610612765,CHA:1610612766
};
const CLR = {
  DET:"#1D428A",ORL:"#0077C0",BOS:"#007A33",PHI:"#006BB6",
  NYK:"#003DA5",ATL:"#E03A3E",CLE:"#860038",TOR:"#CE1141",
  OKC:"#007AC1",PHX:"#1D1160",SAS:"#9EA1A2",POR:"#E03A3E",
  DEN:"#0E2240",MIN:"#0C2340",LAL:"#552583",HOU:"#CE1141"
};

// Logo: try NBA CDN, fall back to colored circle — no inline onerror HTML injection
function logo(abbr, sz) {
  sz = sz || 28;
  const id = NBA_ID[abbr];
  const color = CLR[abbr] || '#333';

  // Create wrapper div; use a data attribute so we can swap on error via a global handler
  if (id) {
    return `<img class="team-logo" data-abbr="${abbr}" data-color="${color}" data-sz="${sz}"
      src="https://cdn.nba.com/logos/nba/${id}/global/L/logo.svg"
      width="${sz}" height="${sz}"
      style="object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,.7));display:block;"
      alt="${abbr}">`;
  }
  return fallbackCircle(abbr, color, sz);
}

function fallbackCircle(abbr, color, sz) {
  return `<div class="fb" style="background:${color};width:${sz}px;height:${sz}px">${abbr}</div>`;
}

// Global image error handler — replaces broken logos with colored circle
document.addEventListener('error', function(e) {
  const img = e.target;
  if (img.tagName === 'IMG' && img.classList.contains('team-logo')) {
    const abbr  = img.getAttribute('data-abbr')  || '';
    const color = img.getAttribute('data-color') || '#333';
    const sz    = parseInt(img.getAttribute('data-sz') || '28');
    const fb = document.createElement('div');
    fb.className = 'fb';
    fb.style.cssText = `background:${color};width:${sz}px;height:${sz}px`;
    fb.textContent = abbr;
    img.parentNode.replaceChild(fb, img);
  }
}, true);

// ── 2026 First Round Data ───────────────────────────────────────────────────
const D = {
  e: {
    top: [
      {st:"ip",  t1:{a:"DET",n:"Pistons",     s:1,w:1}, t2:{a:"ORL",n:"Magic",         s:8,w:3}},
      {st:"ip",  t1:{a:"CLE",n:"Cavaliers",   s:4,w:2}, t2:{a:"TOR",n:"Raptors",       s:5,w:2}},
    ],
    bot: [
      {st:"ip",  t1:{a:"BOS",n:"Celtics",     s:2,w:3}, t2:{a:"PHI",n:"76ers",         s:7,w:1}},
      {st:"ip",  t1:{a:"NYK",n:"Knicks",      s:3,w:2}, t2:{a:"ATL",n:"Hawks",         s:6,w:2}},
    ]
  },
  w: {
    top: [
      {st:"done",t1:{a:"OKC",n:"Thunder",     s:1,w:4}, t2:{a:"PHX",n:"Suns",          s:8,w:0}},
      {st:"ip",  t1:{a:"LAL",n:"Lakers",      s:4,w:3}, t2:{a:"HOU",n:"Rockets",       s:5,w:1}},
    ],
    bot: [
      {st:"ip",  t1:{a:"SAS",n:"Spurs",       s:2,w:3}, t2:{a:"POR",n:"Trail Blazers", s:7,w:1}},
      {st:"ip",  t1:{a:"DEN",n:"Nuggets",     s:3,w:2}, t2:{a:"MIN",n:"Timberwolves",  s:6,w:3}},
    ]
  }
};

// ── Render helpers ──────────────────────────────────────────────────────────
function teamRow(t, opp, done) {
  const isW  = done && t.w === 4;
  const isL  = done && t.w < 4;
  const lead = !done && t.w > opp.w;
  const rc = "tr" + (isW?" winner" : lead?" winning" : isL?" loser" : "");
  const nc = "tn" + (isW?" hi" : isL?" out" : "");
  const wc = "wb " + (isW?"champ" : lead?"lead" : "trail");
  const badge = isW
    ? '<div class="wbadge ok">✓</div>'
    : isL ? '<div class="wbadge ko">✕</div>' : "";
  return `<div class="${rc}">
    <span class="sd">${t.s}</span>
    <div class="lw">${logo(t.a,28)}${badge}</div>
    <span class="${nc}">${t.n}</span>
    <span class="${wc}">${t.w}</span>
  </div>`;
}

function seriesCard(s) {
  const done = s.st === "done";
  const g = s.t1.w + s.t2.w;
  const ldr = s.t1.w >= s.t2.w ? s.t1 : s.t2;
  const lbl = done ? ldr.n + " wins" : "Game " + (g+1);
  const bdg = done
    ? '<span class="badge fin">Final</span>'
    : '<span class="badge live">Active</span>';
  return `<div class="mc${done?" done":""}">
    <div class="mc-lbl"><span>${lbl}</span>${bdg}</div>
    ${teamRow(s.t1, s.t2, done)}
    ${teamRow(s.t2, s.t1, done)}
  </div>`;
}

// Blank line placeholder for future rounds (2 lines per slot)
function blankLines(count) {
  let out = '<div class="blank-slots">';
  for (let i = 0; i < count; i++) out += '<div class="blank-line"></div>';
  out += '</div>';
  return out;
}

// ── Build bracket ───────────────────────────────────────────────────────────
function build() {
  const {e,w} = D;

  document.getElementById("bracket").innerHTML = `

  <!-- EAST -->
  <div class="half east" id="e-half">

    <!-- E R1 - actual matchups -->
    <div class="rcol r1" id="e-r1">
      <div class="rh">First Round</div>
      <div class="slots">
        <div class="top-grp">
          ${seriesCard(e.top[0])}
          ${seriesCard(e.top[1])}
        </div>
        <div class="grp-gap"></div>
        <div class="bot-grp">
          ${seriesCard(e.bot[0])}
          ${seriesCard(e.bot[1])}
        </div>
      </div>
    </div>

    <!-- E R2 - blank lines -->
    <div class="rcol r2 blank-col" id="e-r2">
      <div class="blank-rh">Semifinals</div>
      <div class="slots">
        <div class="r2-grp">${blankLines(2)}</div>
        <div class="r2-grp">${blankLines(2)}</div>
      </div>
    </div>

    <!-- E R3 - blank line -->
    <div class="rcol r3 blank-col" id="e-r3">
      <div class="blank-rh">Conf Finals</div>
      <div class="r3-grp">${blankLines(1)}</div>
    </div>

    <svg class="connector-svg" id="svg-e"></svg>
  </div>

  <!-- FINALS -->
  <div class="fcenter">
    <div class="trophy">🏆</div>
    <div class="ftitle">NBA Finals</div>
    <div class="fcard">
      <div class="frow">
        <span class="frow-lbl" style="color:var(--accent-w)">West Champion</span>
      </div>
      <div class="fdiv"></div>
      <div class="frow">
        <span class="frow-lbl" style="color:var(--accent-e)">East Champion</span>
      </div>
    </div>
  </div>

  <!-- WEST -->
  <div class="half west" id="w-half">

    <!-- W R1 - actual matchups -->
    <div class="rcol r1" id="w-r1">
      <div class="rh">First Round</div>
      <div class="slots">
        <div class="top-grp">
          ${seriesCard(w.top[0])}
          ${seriesCard(w.top[1])}
        </div>
        <div class="grp-gap"></div>
        <div class="bot-grp">
          ${seriesCard(w.bot[0])}
          ${seriesCard(w.bot[1])}
        </div>
      </div>
    </div>

    <!-- W R2 - blank lines -->
    <div class="rcol r2 blank-col" id="w-r2">
      <div class="blank-rh">Semifinals</div>
      <div class="slots">
        <div class="r2-grp">${blankLines(2)}</div>
        <div class="r2-grp">${blankLines(2)}</div>
      </div>
    </div>

    <!-- W R3 - blank line -->
    <div class="rcol r3 blank-col" id="w-r3">
      <div class="blank-rh">Conf Finals</div>
      <div class="r3-grp">${blankLines(1)}</div>
    </div>

    <svg class="connector-svg" id="svg-w"></svg>
  </div>`;
}

// ── SVG connector lines ─────────────────────────────────────────────────────
function ry(el,ref){const a=el.getBoundingClientRect(),b=ref.getBoundingClientRect();return a.top-b.top+a.height/2;}
function rx(el,ref){const a=el.getBoundingClientRect(),b=ref.getBoundingClientRect();return a.right-b.left;}
function lx(el,ref){const a=el.getBoundingClientRect(),b=ref.getBoundingClientRect();return a.left-b.left;}
function P(d,c){return `<path d="${d}" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;}

function drawLines() {
  // EAST — connect R1 cards to blank lines in R2, and R2 blanks to R3 blank
  const eh = document.getElementById("e-half");
  if (!eh) return;
  const svgE = document.getElementById("svg-e");
  svgE.setAttribute("width", eh.offsetWidth);
  svgE.setAttribute("height", eh.offsetHeight);

  const eC  = document.querySelectorAll("#e-r1 .mc");
  const e2  = document.querySelectorAll("#e-r2 .blank-slots");
  const e3  = document.querySelector("#e-r3 .blank-slots");
  const CE  = "var(--conn-e)";
  let s = "";

  if (eC.length >= 4 && e2.length >= 2) {
    // R1 cards → R2 blank lines (top pair and bot pair)
    const groups = [[0,1,0],[2,3,1]];
    for (const [ia,ib,gi] of groups) {
      const target = e2[gi];
      const tMid   = ry(target, eh);
      for (const i of [ia,ib]) {
        const mx = (rx(eC[i],eh) + lx(target,eh)) / 2;
        s += P(`M${rx(eC[i],eh)} ${ry(eC[i],eh)} H${mx} V${tMid} H${lx(target,eh)}`, CE);
      }
    }
    // R2 blanks → R3 blank
    if (e3) {
      const tMid = ry(e3, eh);
      for (let i = 0; i < 2; i++) {
        const mx = (rx(e2[i],eh) + lx(e3,eh)) / 2;
        s += P(`M${rx(e2[i],eh)} ${ry(e2[i],eh)} H${mx} V${tMid} H${lx(e3,eh)}`, CE);
      }
    }
  }
  svgE.innerHTML = s;

  // WEST — flipped (row-reverse), so connections go right-to-left
  const wh = document.getElementById("w-half");
  const svgW = document.getElementById("svg-w");
  svgW.setAttribute("width", wh.offsetWidth);
  svgW.setAttribute("height", wh.offsetHeight);

  const wC  = document.querySelectorAll("#w-r1 .mc");
  const w2  = document.querySelectorAll("#w-r2 .blank-slots");
  const w3  = document.querySelector("#w-r3 .blank-slots");
  const CW  = "var(--conn-w)";
  let ws = "";

  if (wC.length >= 4 && w2.length >= 2) {
    const groups = [[0,1,0],[2,3,1]];
    for (const [ia,ib,gi] of groups) {
      const target = w2[gi];
      const tMid   = ry(target, wh);
      for (const i of [ia,ib]) {
        const mx = (lx(wC[i],wh) + rx(target,wh)) / 2;
        ws += P(`M${lx(wC[i],wh)} ${ry(wC[i],wh)} H${mx} V${tMid} H${rx(target,wh)}`, CW);
      }
    }
    if (w3) {
      const tMid = ry(w3, wh);
      for (let i = 0; i < 2; i++) {
        const mx = (lx(w2[i],wh) + rx(w3,wh)) / 2;
        ws += P(`M${lx(w2[i],wh)} ${ry(w2[i],wh)} H${mx} V${tMid} H${rx(w3,wh)}`, CW);
      }
    }
  }
  svgW.innerHTML = ws;
}

// ── Refresh scheduler ───────────────────────────────────────────────────────
function etMin() {
  const p = new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"numeric",hour12:false}).formatToParts(new Date());
  return parseInt(p.find(x=>x.type==="hour").value)*60 + parseInt(p.find(x=>x.type==="minute").value);
}
function getNext() {
  const c = etMin();
  const ts = [{m:21*60,l:"9:00 PM"},{m:23*60,l:"11:00 PM"},{m:25*60,l:"1:00 AM"}];
  for (const t of ts) { if (c < t.m) return {l:t.l, ms:(t.m-c)*60000}; }
  return {l:"9:00 PM", ms:((24*60-c)+21*60)*60000};
}
function tick() {
  const {l,ms} = getNext();
  const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  const cd = h>0 ? ` (in ${h}h ${m}m)` : m>0 ? ` (in ${m}m)` : "";
  document.getElementById("nr").textContent = "Next: " + l + cd + " ET";
}
function sched() {
  const {ms} = getNext();
  setTimeout(function() {
    document.getElementById("rn").classList.add("on");
    setTimeout(function() { location.reload(); }, 1400);
  }, ms);
}

// ── Init ────────────────────────────────────────────────────────────────────
build();

document.getElementById("lu").textContent = "Updated " +
  new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",timeZone:"America/New_York"}) + " ET";

tick();
sched();
setInterval(tick, 60000);

requestAnimationFrame(function(){ setTimeout(drawLines, 200); });
window.addEventListener("resize", function(){ setTimeout(drawLines, 80); });
</script>
